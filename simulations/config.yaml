# ============================================
# SIMULATION CONFIGURATION
# ============================================

# API Endpoints
api:
  prediction_url: "http://localhost:8000/predict"
  health_url: "http://localhost:8000/health"
  evidently_capture_url: "http://localhost:8001/capture"
  evidently_analyze_url: "http://localhost:8001/analyze"

# Model Configuration
model:
  name: "wine_quality_model"
  version: "1"
  feature_count: 13

# Wine Dataset Feature Ranges (for realistic data generation)
features:
  alcohol:
    min: 11
    max: 15
    mean: 13
    std: 1

  malic_acid:
    min: 0.7
    max: 5.8
    mean: 2.3
    std: 1

  ash:
    min: 1.3
    max: 3.2
    mean: 2.3
    std: 0.3

  alcalinity_of_ash:
    min: 10
    max: 30
    mean: 19
    std: 3

  magnesium:
    min: 70
    max: 160
    mean: 100
    std: 15

  total_phenols:
    min: 0.9
    max: 3.8
    mean: 2.3
    std: 0.6

  flavanoids:
    min: 0.3
    max: 5
    mean: 2
    std: 1

  nonflavanoid_phenols:
    min: 0.1
    max: 0.7
    mean: 0.3
    std: 0.1

  proanthocyanins:
    min: 0.4
    max: 3.5
    mean: 1.5
    std: 0.5

  color_intensity:
    min: 1
    max: 13
    mean: 5
    std: 2

  hue:
    min: 0.4
    max: 1.7
    mean: 1
    std: 0.2

  od280/od315_of_diluted_wines:
    min: 1.3
    max: 4
    mean: 2.6
    std: 0.6

  proline:
    min: 300
    max: 1600
    mean: 750
    std: 300

# Simulation Scenarios
scenarios:
  normal:
    description: "Normal traffic without drift"
    drift_multiplier: 1.0
    noise_level: 0.1
    
  slight_drift:
    description: "Slight drift in 2-3 features"
    drift_multiplier: 1.2
    noise_level: 0.15
    affected_features: 2
    
  moderate_drift:
    description: "Moderate drift in 3-5 features"
    drift_multiplier: 1.5
    noise_level: 0.2
    affected_features: 4
    
  severe_drift:
    description: "Severe drift in most features"
    drift_multiplier: 2.0
    noise_level: 0.3
    affected_features: 7
    
  sudden_shift:
    description: "Sudden distribution shift"
    drift_multiplier: 2.5
    noise_level: 0.4
    affected_features: 10

# Traffic Patterns
traffic:
  burst:
    requests_per_second: 10
    duration_seconds: 60
    description: "High traffic burst"
    
  steady:
    requests_per_second: 2
    duration_seconds: 300
    description: "Steady traffic flow"
    
  gradual:
    start_rps: 1
    end_rps: 10
    duration_seconds: 180
    description: "Gradually increasing traffic"

# Default Settings
defaults:
  requests_per_second: 2
  duration_seconds: 60
  scenario: "normal"
  capture_to_evidently: true
  analyze_after_completion: true
  show_progress: true
  log_level: "INFO"

